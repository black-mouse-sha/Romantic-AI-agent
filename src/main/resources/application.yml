spring:
  application:
    name: PersonAiAgent
  profiles:
    active: local
  ai:
    ollama:
      enabled: true
      base-url: http://localhost:11434
      chat:
        options:
          model: deepseek-r1:1.5b
server:
  port: 1207
  servlet:
    context-path: /api
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.littleperson.personaiagent.controller
knife4j:
  enable: true
  setting:
    language: zh_cn